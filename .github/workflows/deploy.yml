name: Deploy to VPS
on:
  push:
    branches:
      - main  # Triggered whenever you push to the thoranam branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync files to VPS
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          # TARGET is the folder we created in the previous step
          TARGET: "/var/www/balloons.supercrystals.in/public_html/"
          # EXCLUDE removes git metadata from being uploaded
          EXCLUDE: "/.github/, /.git/, /node_modules/"